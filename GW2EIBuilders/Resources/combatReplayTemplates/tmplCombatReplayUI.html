<template>
    <div class="d-flex mt-2 justify-content-center">
        <div class="d-flex flex-column align-items-center mr-2" style="margin-left: auto; width:620px;">
            <dps-graph-mode-selector-component :data="graphdata" :phaseduration="phaseduration" :phasehassubphases="false" :ignorebreakbar="false" :column="false" />
            <combat-replay-damage-stats-component :time="animationStatus.time" :playerid="animationStatus.selectedActorID" :graphdata="graphdata" />
            <combat-replay-extra-decorations-component :light="light" />
        </div>
        <combat-replay-animation-control-component :time="animationStatus.time / 1000.0" :light="light" :range="animationStatus.range":animated="animationStatus.animated" />
        <div class="d-flex flex-column align-items-center ml-2" style="margin-right: auto;width:500px; height:940px;">
            <combat-replay-status-data-component :time="animationStatus.time" :light="light" :selectedactorid="animationStatus.selectedActorID" />
        </div>
    </div>
</template>

<script>
    Vue.component("combat-replay-ui-component", {
        props: ["mode", "light"],
        template: `${template}`,
        data: function () {
            return {
                animationStatus: reactiveAnimationData,
                graphdata: {
                    dpsmode: 0,
                    graphmode: logData.wvw ? GraphType.Damage : GraphType.DPS,
                    damagemode: DamageType.All,
                }
            };
        },
        computed: {
            phase: function () {
                return logData.phases[0];
            },
            phaseduration: function () {
                return this.phase.end - this.phase.start;
            },
            targets: function () {
                return logData.targetless ? [] : this.phase.targets;
            }
        },
        created() {
            animator = new Animator(crData);
        },
        activated() {
            if (this.animationStatus.animated && animator != null) {
                animator.startAnimate(false);
            }
        },
        deactivated() {
            if (this.animationStatus.animated && animator != null) {
                animator.stopAnimate(false);
            }
        },
    });
</script>
