<template>
    <div class="d-flex mt-2 justify-content-center">
        <div class="d-flex flex-column align-items-center mr-2" style="margin-left: auto; width:620px;">
            <combat-replay-damage-data-component :time="animationStatus.time" :selectedactorid="animationStatus.selectedActorID">
            </combat-replay-damage-data-component>
            <combat-replay-extra-decorations-component :light="light"></combat-replay-extra-decorations-component>
        </div>
        <combat-replay-animation-control-component :time="animationStatus.time / 1000.0" :light="light" :range="animationStatus.range":animated="animationStatus.animated">        
        </combat-replay-animation-control-component>
        <div class="d-flex flex-column align-items-center ml-2" style="margin-right: auto;width:500px; height:940px;">
            <nav-tabs-component v-if="hasMechanics" :tabs="tabs" :time="animationStatus.time" :light="light" :selectedactorid="animationStatus.selectedActorID">
            </nav-tabs-component>
        </div>
    </div>
</template>

<script>
    Vue.component("combat-replay-ui-component", {
        props: ["mode", "light"],
        template: `${template}`,
        data: function () {
            return {
                animationStatus: reactiveAnimationData,
                selectionMode: 0,
                targetless: logData.targetless,
                tabs: [
                    {
                        id: 'actors',
                        label: 'Actors',
                        component: 'combat-replay-actors-stats-component'
                    },
                    {
                        id: 'mechanics',
                        label: 'Mechanics',
                        component: 'combat-replay-mechanics-list-component'
                    }
                ]
            };
        },
        hasMechanics: function () {
            return graphData.mechanics.length > 0;
        },
        created() {
            animator = new Animator(crData);
        },
        activated() {
            if (this.animationStatus.animated && animator != null) {
                animator.startAnimate(false);
            }
        },
        deactivated() {
            if (this.animationStatus.animated && animator != null) {
                animator.stopAnimate(false);
            }
        },
    });
</script>
