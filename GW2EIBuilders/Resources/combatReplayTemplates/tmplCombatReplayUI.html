<template>
    <div class="d-flex mt-2 justify-content-center">
        <div class="d-flex flex-column align-items-center mr-2" style="margin-left: auto; width:620px;">
            <combat-replay-damage-data-component :time="animationStatus.time" :selectedactorid="animationStatus.selectedActorID" />
            <combat-replay-extra-decorations-component :light="light" />
        </div>

        <combat-replay-animation-control-component :time="animationStatus.time / 1000.0" :light="light" :range="animationStatus.range":animated="animationStatus.animated" />        

        <nav-tabs-component v-if="hasMechanics" class="d-flex flex-column align-items-center ml-2" style="margin-right: auto;width:500px; height:940px;">
            <combat-replay-actors-stats-component label="Actors" :time="animationStatus.time" :light="light" :selectedactorid="animationStatus.selectedActorID" />
            <combat-replay-mechanics-list-component label="Mechanics" :time="animationStatus.time" :light="light" :selectedactorid="animationStatus.selectedActorID" />
        </nav-tabs-component>
    </div>
</template>

<script>
    Vue.component("combat-replay-ui-component", {
        props: ["mode", "light"],
        template: `${template}`,
        data: function () {
            return {
                animationStatus: reactiveAnimationData,
                selectionMode: 0,
                targetless: logData.targetless
            };
        },
        hasMechanics: function () {
            return graphData.mechanics.length > 0;
        },
        created() {
            animator = new Animator(crData);
        },
        activated() {
            if (this.animationStatus.animated && animator != null) {
                animator.startAnimate(false);
            }
        },
        deactivated() {
            if (this.animationStatus.animated && animator != null) {
                animator.stopAnimate(false);
            }
        },
    });
</script>
