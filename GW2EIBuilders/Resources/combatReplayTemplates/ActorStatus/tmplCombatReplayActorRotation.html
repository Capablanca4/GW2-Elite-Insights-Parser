<template>
    <div class="d-flex align-items-center actor-rotation">
        <div v-if="castingSkill">
            <img class="icon-cur-cr-rota" :class="getIconClass(castingSkill)" :src="castingSkill.skill.icon" :title="getTooltip(castingSkill)" />
        </div>
        <div v-else class="empty-icon-cur-cr-rota">

        </div>
        <div v-for="next in nextSkills">
            <img class="icon-next-cr-rota" :class="getIconClass(next)" :src="next.skill.icon" :title="getTooltip(next)" />
        </div>
    </div>
</template>

<script>
    Vue.component("combat-replay-actor-rotation-component", {
        props: ["time", "actorindex", "isTarget"],
        template: `${template}`,
        methods: {
            getIconClass(cast) {
                return {
                    'rot-cancelled': cast.type === RotationStatus.CANCEL,
                    'rot-unknown': cast.type === RotationStatus.UNKNOWN,
                    'rot-animfull': cast.type === RotationStatus.FULL,
                    'rot-instant': cast.type === RotationStatus.INSTANT
                };
            },
            getTooltip(cast) {
                const tooltip = `${cast.skill.name} at ${cast.time}s`;
                if (cast.type === RotationStatus.INSTANT) {
                    return tooltip;
                } else {
                    return tooltip + ` for ${cast.duration}ms`;
                }
            }
        },
        computed: {
            actor: function () {
                return this.isTarget ? logData.targets[this.actorindex] : logData.players[this.actorindex];
            },
            actorRotation: function () {
                return this.actor.details.rotation[0].map(skill => ({
                    time: skill[0],
                    skill: findSkill(false, skill[1]),
                    duration: skill[2],
                    type: skill[3]
                }));
            },
            castingSkill: function () {
                return this.actorRotation.find(skill => skill.time <= this.time / 1000.0 && skill.time + skill.duration / 1000.0 > this.time / 1000.0);
            },
            nextSkills: function () {
                const nextSkillIndex = this.actorRotation.findIndex(skill => skill.time > this.time / 1000.0);
                return this.actorRotation.slice(nextSkillIndex, nextSkillIndex + 7);
            }
        }
    });
</script>
