<template></template>

<script>
    Vue.component("nav-tabs-component", {
        template: `${template}`,
        data: function () {
            return {
                activeIndex: 0
            }
        },

        render(h) {
            const tabVNodes = (this.$slots.default || []).filter(vnode => vnode.tag);

            const navItems = tabVNodes.map((vnode, index) => {
                const label = vnode.componentOptions?.propsData?.label ?? vnode.data?.attrs?.label;
                return h(
                    'li',
                    {
                        key: label + '-' + index,
                        attrs: { role: 'presentation' }
                    },
                    [
                        h(
                            'button',
                            {
                                class: [
                                    'nav-link',
                                    { 'active': this.activeIndex === index },
                                    { 'bg-transparent': this.activeIndex !== index }
                                ],
                                attrs: {
                                    id: 'tab-' + index,
                                    type: "button",
                                    role: "tab",
                                    'aria-selected': this.activeIndex === index,
                                    'aria-controls': 'panel-' + index
                                },
                                on: {
                                    click: (e) => {
                                        e.preventDefault();
                                        this.activeIndex = index;
                                    }
                                }
                            },
                            label
                        )
                    ]
                );
            });

            const activeVNode = tabVNodes[this.activeIndex];
            return h('div', [
                h('ul', { class: 'nav nav-tabs justify-content-center mb-1', attrs: { role: 'tablist' } }, navItems),
                h('div', { attrs: { role: 'tabpanel', id: 'panel-' + this.activeIndex, 'aria-labelledby': 'tab-' + this.activeIndex } }, [
                    h('keep-alive', activeVNode ? [activeVNode] : [])
                ])
            ]);
        }
    });
</script>
