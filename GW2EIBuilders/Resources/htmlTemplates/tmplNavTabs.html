<template>
    <div>
        <ul class="nav nav-tabs justify-content-center mb-1" role="tablist">
            <li v-for="(tab, index) in tabs" :key="index" role="presentation">
                <button type="button" role="tab" class="nav-link"
                        :class="{active: activeTab === index, 'bg-transparent': activeTab !== index}" :id="'tab-' + index"
                        :aria-selected="activeTab === index" :aria-controls="'panel-' + index"
                        @click="selectTab(index)">
                    {{ tab.$el.attributes.label.nodeValue }}
                </button>
            </li>
        </ul>
        <div role="tabpanel" :id="'panel-' + activeTab" :aria-labelledby="'tab-' + activeTab">
            <slot />
        </div>
    </div>
</template>

<script>
    Vue.component("nav-tabs-component", {
        template: `${template}`,
        data: function () {
            return {
                activeTab: 0,
                tabs: []
            }
        },
        mounted() {
            this.tabs = this.$children;
            this.selectTab(0);
        },
        methods: {
            selectTab(index) {
                this.activeTab = index;
                this.tabs.forEach(t => t.$el.hidden = 'hidden');
                this.tabs[index].$el.hidden = '';
            }
        }
    });
</script>
